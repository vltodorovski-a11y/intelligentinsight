<script>
/* Ран приказ на грешки: ако нешто во главната скрипта не работи на овој уред,
   пораката ќе се прикаже на екранот наместо тивко да ја блокира најавата. */
window.onerror = function(msg, src, line){
  if(String(msg).indexOf("Script error")===0) return false; /* придушена грешка од надворешна скрипта — не е од платформата */
  try{
    var b = document.getElementById('js-err');
    if(!b){
      b = document.createElement('div');
      b.id = 'js-err';
      b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#CD4335;color:#fff;padding:10px 14px;font:13px/1.5 sans-serif;';
      (document.body || document.documentElement).appendChild(b);
    }
    b.textContent = 'Технички проблем на овој уред: ' + msg + ' (ред ' + line + '). Отворете ја датотеката во понов прелистувач (Chrome/Safari) или пратете ни ја оваа порака.';
  }catch(e){}
  return false;
};
</script>

<script>
/* ==================================================================
   INTELLIGENT INSIGHT v3 — самостоен .html фајл
   · Сметки за клиенти (до 20 активни истовремено) + админ-интерфејс
   · Демо режим / сопствени податоци — избор по сметка
   · Поправена најава на телефон: надворешните скрипти и фонтови веќе
     не го блокираат вчитувањето, а сите настани се врзани безбедно.
   ================================================================== */

"use strict";

/* ---------- безбедно зачувување (работи и таму каде localStorage е недостапен) ---------- */
const memStore={};
const store={
  get(k){ try{ return window.localStorage.getItem(k); }catch(e){ return memStore[k]!==undefined?memStore[k]:null; } },
  set(k,v){ try{ window.localStorage.setItem(k,v); }catch(e){ memStore[k]=v; } }
};

/* ---------- помошни ---------- */
const MAX_AKTIVNI=20;
const mkd = n => Math.round(n).toLocaleString("mk-MK").replace(/,/g,".") + " МКД";
const nz=(x,d)=>(x==null?d:x);
const num = v => { const n=Number(String(nz(v,"")).replace(/[^\d.,-]/g,"").replace(",",".")); return isNaN(n)?0:n; };
const findCol = (row,keys) => Object.keys(row||{}).find(k=>keys.some(s=>k.toLowerCase().includes(s)));
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const rizikBoja=(v,vl)=>{const s=v*vl;return s>=15?"var(--alarm)":s>=8?"var(--amber)":"var(--ok)";};
const probBoja=p=>p>=75?"var(--alarm)":p>=50?"var(--amber)":"var(--ok)";
const denes=()=>new Date().toLocaleDateString("mk-MK");
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.style.display="block";
  clearTimeout(t._h); t._h=setTimeout(()=>t.style.display="none",3200); }
window.addEventListener("error",e=>{ try{toast("Грешка: "+e.message);}catch(_){} });

/* ---------- извори ---------- */
const SOURCES={
  kpi:{naziv:"КПИ (Excel)",ikona:"📈",format:"Месец, Приход, Трошоци за квалитет, Испораки на време %",
    opis:"Месечни клучни показатели: приход, трошоци за квалитет, точност на испорака."},
  complaints:{naziv:"Рекламации",ikona:"📮",format:"Датум, Категорија, Трошок, Статус",
    opis:"Поплаки и рекламации од купувачи, со категорија и трошок за решавање."},
  capa:{naziv:"CAPA мерки",ikona:"🔧",format:"Ознака, Област, Точка ИСО, Рок, Статус",
    opis:"Корективни и превентивни мерки: отворени, затворени и пробиени рокови."},
  audits:{naziv:"Внатрешни проверки",ikona:"🔍",format:"Датум, Процес, Точка ИСО, Тип на наод, Статус",
    opis:"Наоди од внатрешни проверки: големи/мали неусогласености и забелешки."},
  energy:{naziv:"Потрошувачка на енергија",ikona:"⚡",format:"Месец, kWh, Трошок",
    opis:"Месечна потрошувачка на електрична енергија и трошок (ИСО 50001 контекст)."},
  waste:{naziv:"Отпад",ikona:"♻️",format:"Месец, Количина кг, Трошок за депонирање, Рециклирано %",
    opis:"Генериран отпад, трошок за згрижување и стапка на рециклирање (ИСО 14001 контекст)."},
};
const PRAZNI={kpi:null,complaints:null,capa:null,audits:null,energy:null,waste:null};
const OBLAST_IME={
  "8.5.1":"Контрола на производство","7.2":"Компетентност и обука","7.1.5":"Ресурси за следење и мерење",
  "8.4":"Надворешни добавувачи","8.5.4":"Зачувување (ракување и складирање)",
  "14001·8.1":"Оперативна контрола — животна средина","50001·6.2":"Енергетски цели и планирање",
};

/* ---------- демо податоци ---------- */
const MESECI=["Јан","Фев","Мар","Апр","Мај","Јун"];
const DEMO={
  kpi:MESECI.map((m,i)=>({mesec:m,prihod:[4100,4250,3980,4400,4520,4610][i]*1000,
    trosociKvalitet:[310,342,405,388,447,486][i]*1000,naVreme:[96,95,92,93,90,89][i]})),
  complaints:[
    ["05.01","Димензии надвор од толеранција",34000,"затворена"],["19.01","Оштетена амбалажа",8000,"затворена"],
    ["02.02","Димензии надвор од толеранција",41000,"затворена"],["21.02","Доцнење на испорака",12000,"затворена"],
    ["06.03","Димензии надвор од толеранција",56000,"затворена"],["14.03","Површинска обработка",22000,"затворена"],
    ["28.03","Доцнење на испорака",15000,"затворена"],["09.04","Димензии надвор од толеранција",48000,"затворена"],
    ["17.04","Оштетена амбалажа",9000,"затворена"],["03.05","Димензии надвор од толеранција",62000,"отворена"],
    ["12.05","Доцнење на испорака",18000,"затворена"],["26.05","Површинска обработка",27000,"отворена"],
    ["04.06","Димензии надвор од толеранција",71000,"отворена"],["15.06","Доцнење на испорака",21000,"отворена"],
  ].map(([datum,kategorija,trosok,status],i)=>({id:"РК-"+String(i+1).padStart(2,"0"),datum,kategorija,trosok,status})),
  capa:[
    ["КМ-01","Контрола на производство","8.5.1","15.03","затворена"],
    ["КМ-02","Компетентност / обука","7.2","30.04","пробиен рок"],
    ["КМ-03","Калибрација на опрема","7.1.5","20.05","пробиен рок"],
    ["КМ-04","Оценување на добавувачи","8.4","10.06","отворена"],
    ["КМ-05","Контрола на производство","8.5.1","25.05","пробиен рок"],
    ["КМ-06","Управување со отпад","14001·8.1","30.06","отворена"],
    ["КМ-07","Ракување и складирање","8.5.4","15.04","затворена"],
    ["КМ-08","Енергетска ефикасност","50001·6.2","31.07","отворена"],
  ].map(([id,oblast,tocka,rok,status])=>({id,oblast,tocka,rok,status})),
  audits:[
    ["12.02","Производство","8.5.1","голема","отворен"],["12.02","Производство","8.5.1","мала","затворен"],
    ["13.02","Метрологија","7.1.5","мала","отворен"],["10.03","Човечки ресурси","7.2","мала","отворен"],
    ["10.03","Набавка","8.4","забелешка","затворен"],["14.04","Производство","8.5.1","мала","отворен"],
    ["14.04","Магацин","8.5.4","забелешка","затворен"],["12.05","Метрологија","7.1.5","голема","отворен"],
    ["12.05","Животна средина","14001·8.1","мала","отворен"],["09.06","Енергетски тим","50001·6.2","забелешка","отворен"],
  ].map(([datum,proces,tocka,tip,status],i)=>({id:"Н-"+String(i+1).padStart(2,"0"),datum,proces,tocka,tip,status})),
  energy:MESECI.map((m,i)=>({mesec:m,kwh:[118,121,134,129,147,156][i]*100,trosok:[94,97,109,105,121,130][i]*1000})),
  waste:MESECI.map((m,i)=>({mesec:m,kg:[2100,2260,2740,2580,3050,3240][i],trosok:[63,68,84,79,95,102][i]*1000,recikl:[34,33,30,31,27,25][i]})),
};

/* ---------- нормализација на прикачени датотеки ---------- */
const NORMALIZERS={
  kpi(rows){const r0=rows[0];if(!r0)return null;
    const cM=findCol(r0,["месец","month","период"]),cP=findCol(r0,["приход","revenue"]),
          cT=findCol(r0,["квалитет","quality","трошоц","трошок"]),cV=findCol(r0,["време","time","испорак"]);
    if(!cM||!cT)return null;
    return rows.map(r=>({mesec:String(r[cM]),prihod:num(r[cP]),trosociKvalitet:num(r[cT]),naVreme:num(r[cV])}));},
  complaints(rows){const r0=rows[0];if(!r0)return null;
    const cD=findCol(r0,["датум","date"]),cK=findCol(r0,["категор","тип","type","category","опис"]),
          cT=findCol(r0,["трошок","cost","изно"]),cS=findCol(r0,["статус","status"]);
    if(!cK)return null;
    return rows.map((r,i)=>({id:"РК-"+(i+1),datum:String(nz(r[cD],"")),kategorija:String(r[cK]),trosok:num(r[cT]),status:String(nz(r[cS],"отворена")).toLowerCase()}));},
  capa(rows){const r0=rows[0];if(!r0)return null;
    const cI=findCol(r0,["ознака","id","број"]),cO=findCol(r0,["област","опис","area"]),
          cK=findCol(r0,["точка","клаузул","clause","исо","iso"]),cR=findCol(r0,["рок","due"]),cS=findCol(r0,["статус","status"]);
    if(!cS)return null;
    return rows.map((r,i)=>({id:String(nz(r[cI],"КМ-"+(i+1))),oblast:String(nz(r[cO],"")),tocka:String(nz(r[cK],"")),rok:String(nz(r[cR],"")),status:String(r[cS]).toLowerCase()}));},
  audits(rows){const r0=rows[0];if(!r0)return null;
    const cD=findCol(r0,["датум","date"]),cP=findCol(r0,["процес","process","сектор"]),
          cK=findCol(r0,["точка","клаузул","clause","исо","iso"]),cT=findCol(r0,["тип","вид","type"]),cS=findCol(r0,["статус","status"]);
    if(!cK&&!cP)return null;
    return rows.map((r,i)=>({id:"Н-"+(i+1),datum:String(nz(r[cD],"")),proces:String(nz(r[cP],"")),tocka:String(nz(r[cK],"")),tip:String(nz(r[cT],"мала")).toLowerCase(),status:String(nz(r[cS],"отворен")).toLowerCase()}));},
  energy(rows){const r0=rows[0];if(!r0)return null;
    const cM=findCol(r0,["месец","month","период"]),cK=findCol(r0,["kwh","квч","потрош"]),cT=findCol(r0,["трошок","cost"]);
    if(!cK)return null;
    return rows.map(r=>({mesec:String(nz(r[cM],"")),kwh:num(r[cK]),trosok:num(r[cT])}));},
  waste(rows){const r0=rows[0];if(!r0)return null;
    const cM=findCol(r0,["месец","month","период"]),cKg=findCol(r0,["кг","kg","количин"]),
          cT=findCol(r0,["трошок","cost","депони"]),cR=findCol(r0,["рецикл","recycl"]);
    if(!cKg&&!cT)return null;
    return rows.map(r=>({mesec:String(nz(r[cM],"")),kg:num(r[cKg]),trosok:num(r[cT]),recikl:num(r[cR])}));},
};

/* ---------- аналитички мотор ---------- */
function analyse(d){
  const {kpi,complaints,capa,audits,energy,waste}=d;
  if(!kpi&&!complaints&&!capa&&!audits&&!energy&&!waste) return null;

  const leaks=[];
  if(kpi&&kpi.length){
    const t=kpi.reduce((a,b)=>a+b.trosociKvalitet,0);
    const rast=kpi.length>1?Math.round((kpi[kpi.length-1].trosociKvalitet/kpi[0].trosociKvalitet-1)*100):0;
    leaks.push({naziv:"Трошоци за квалитет (шкарт, доработка)",izvor:"КПИ Excel",iznos:t,trend:rast,
      opis:`Од ${kpi[0].mesec} до ${kpi[kpi.length-1].mesec} трошоците за квалитет ${rast>=0?"растат":"паѓаат"} за ${Math.abs(rast)}%. `+
        (kpi[0].prihod?`Во последниот месец тоа е ${(kpi[kpi.length-1].trosociKvalitet/kpi[kpi.length-1].prihod*100).toFixed(1)}% од приходот.`:"")});
  }
  if(complaints&&complaints.length){
    const t=complaints.reduce((a,b)=>a+b.trosok,0);
    const kat={};complaints.forEach(c=>{kat[c.kategorija]=(kat[c.kategorija]||0)+c.trosok;});
    const top=Object.entries(kat).sort((a,b)=>b[1]-a[1])[0];
    leaks.push({naziv:"Рекламации од купувачи",izvor:"Рекламации",iznos:t,trend:null,
      opis:`${complaints.length} рекламации во периодот. Најскапа категорија: „${top[0]}" — ${mkd(top[1])} (${t?Math.round(top[1]/t*100):0}% од вкупниот трошок).`});
  }
  if(energy&&energy.length>2){
    const avg3=energy.slice(0,3).reduce((a,b)=>a+b.trosok,0)/3;
    const nad=energy.reduce((a,b)=>a+Math.max(0,b.trosok-avg3),0);
    if(nad>0) leaks.push({naziv:"Надпросечна потрошувачка на енергија",izvor:"Енергија",iznos:nad,
      trend:Math.round((energy[energy.length-1].kwh/energy[0].kwh-1)*100),
      opis:`Трошокот над основната линија (просек на првите 3 месеци) изнесува ${mkd(nad)}. Потрошувачката во kWh расте побрзо од обемот на работа — веројатна енергетска неефикасност.`});
  }
  if(waste&&waste.length){
    const t=waste.reduce((a,b)=>a+b.trosok,0);
    const rec=waste[waste.length-1].recikl;
    leaks.push({naziv:"Трошок за згрижување отпад",izvor:"Отпад",iznos:t,
      trend:waste.length>1?Math.round((waste[waste.length-1].kg/waste[0].kg-1)*100):null,
      opis:`Количината на отпад расте, а стапката на рециклирање ${rec?`падна на ${rec}%`:"не се следи"}. Дел од овој трошок е директно поврзан со шкартот во производство.`});
  }
  const probieniCapa=(capa||[]).filter(c=>c.status.includes("проби")||c.status.includes("overdue"));
  if(probieniCapa.length){
    leaks.push({naziv:"Пробиени рокови на CAPA мерки",izvor:"CAPA",iznos:probieniCapa.length*45000,trend:null,procenka:true,
      opis:`${probieniCapa.length} мерки со пробиен рок. Проценет трошок од повторување на истите проблеми додека мерката не е спроведена (проценка: 45.000 МКД по мерка месечно).`});
  }
  leaks.sort((a,b)=>b.iznos-a.iznos);
  const vkupno=leaks.reduce((a,b)=>a+b.iznos,0);

  const rizici=[];
  if(probieniCapa.length>=2) rizici.push({naziv:"Неефективен CAPA процес",v:Math.min(5,2+probieniCapa.length),vl:4,sektor:"СМК",
    opis:`${probieniCapa.length} корективни мерки со пробиен рок (${probieniCapa.map(c=>c.id).join(", ")}). Проблемите остануваат отворени и се повторуваат — ова е и чест наод на сертификациски проверки (точка 10.2).`});
  if(complaints&&complaints.length){
    const kat={};complaints.forEach(c=>{kat[c.kategorija]=(kat[c.kategorija]||0)+1;});
    const [ime,br]=Object.entries(kat).sort((a,b)=>b[1]-a[1])[0];
    if(br/complaints.length>=0.3) rizici.push({naziv:`Повторлив дефект: „${ime}"`,v:4,vl:4,sektor:"Производство / Квалитет",
      opis:`${br} од ${complaints.length} рекламации се од иста категорија. Системски проблем, не изолиран случај — ризик од губење клучен купувач.`});
    const otvoreni=complaints.filter(c=>c.status.includes("отвор")).length;
    if(otvoreni>=3) rizici.push({naziv:"Заостанати нерешени рекламации",v:3,vl:3,sektor:"Продажба / Квалитет",
      opis:`${otvoreni} рекламации сè уште отворени. Времето на одговор кон купувачите се продолжува — ризик за задоволството на купувачите (точка 9.1.2).`});
  }
  if(audits&&audits.length){
    const golemi=audits.filter(a=>a.tip.includes("голем")&&a.status.includes("отвор"));
    if(golemi.length) rizici.push({naziv:"Отворени големи неусогласености",v:4,vl:5,sektor:"СМК",
      opis:`${golemi.length} големи неусогласености од внатрешни проверки без затворање (${golemi.map(g=>g.tocka).join(", ")}). Директен ризик за суспензија на сертификатот при надзорна проверка.`});
  }
  if(energy&&energy.length>1&&energy[energy.length-1].kwh/energy[0].kwh>1.15)
    rizici.push({naziv:"Растечка енергетска потрошувачка",v:4,vl:3,sektor:"Одржување / Енергетика",
      opis:`Потрошувачката порасна ${Math.round((energy[energy.length-1].kwh/energy[0].kwh-1)*100)}% во периодот. Можна причина: дотраена опрема или загуби во системот — ризик и за трошоци и за енергетските цели (ИСО 50001).`});
  if(waste&&waste.length>1&&waste[waste.length-1].recikl&&waste[waste.length-1].recikl<waste[0].recikl)
    rizici.push({naziv:"Опаѓачка стапка на рециклирање",v:3,vl:3,sektor:"Животна средина",
      opis:`Рециклирањето падна од ${waste[0].recikl}% на ${waste[waste.length-1].recikl}%. Ризик за еколошките цели (ИСО 14001) и повисоки трошоци за депонирање.`});
  if(kpi&&kpi.length>1&&kpi[kpi.length-1].naVreme&&kpi[kpi.length-1].naVreme<kpi[0].naVreme-3)
    rizici.push({naziv:"Опаѓање на испораки на време",v:3,vl:4,sektor:"Планирање / Логистика",
      opis:`Точноста на испорака падна од ${kpi[0].naVreme}% на ${kpi[kpi.length-1].naVreme}%. Корелира со растот на доработки — доцнењата почнуваат во производството, не во транспортот.`});
  rizici.sort((a,b)=>b.v*b.vl-a.v*a.vl);
  rizici.forEach((r,i)=>r.id="Р-"+(i+1));

  const predv=[];
  if(audits&&audits.length){
    const poTocka={};
    audits.forEach(a=>{if(!a.tocka)return;(poTocka[a.tocka]=poTocka[a.tocka]||[]).push(a);});
    Object.entries(poTocka).forEach(([tocka,naodi])=>{
      let p=25+naodi.length*14;
      const signali=[`${naodi.length} наод(и) од внатрешни проверки на истата точка`];
      if(naodi.some(n=>n.tip.includes("голем"))){p+=12;signali.push("меѓу нив има голема неусогласеност");}
      if(naodi.some(n=>n.status.includes("отвор"))){p+=8;signali.push("наодите сè уште не се затворени");}
      const capaTuka=(capa||[]).filter(c=>c.tocka===tocka);
      if(capaTuka.some(c=>c.status.includes("проби"))){p+=18;signali.push("поврзаната CAPA мерка е со пробиен рок");}
      if(tocka==="8.5.1"&&complaints&&complaints.length){
        const proizv=complaints.filter(c=>/димензи|површин|дефект|квалитет/i.test(c.kategorija)).length;
        if(proizv>=3){p+=10;signali.push(`${proizv} рекламации поврзани со квалитет на производ`);}
      }
      predv.push({tocka,oblast:OBLAST_IME[tocka]||naodi[0].proces||tocka,p:Math.min(95,p),signali,
        merka:capaTuka.length
          ?`Итно затворање на мерката ${capaTuka[0].id} со проверка на ефективност, пред следната (внатрешна или надзорна) проверка.`
          :"Отворање превентивна мерка и вонредна фокусирана проверка на процесот пред следниот циклус."});
    });
  }
  predv.sort((a,b)=>b.p-a.p);

  const otvoreniNaodi=(audits||[]).filter(a=>a.status.includes("отвор")).length;
  const usogl=Math.max(40,Math.min(99,100-probieniCapa.length*5-otvoreniNaodi*3));
  return {leaks,vkupno,rizici,predv,usogl};
}

/* ---------- вчитување библиотеки на барање ---------- */
function loadLib(url){
  return new Promise(function(res,rej){
    var sc=document.createElement("script");
    sc.src=url; sc.crossOrigin="anonymous";
    sc.onload=function(){res();};
    sc.onerror=function(){rej(new Error("нема мрежа"));};
    document.head.appendChild(sc);
  });
}
var _xlsxP=null,_papaP=null;
function ensureXLSX(){
  if(typeof XLSX!=="undefined") return Promise.resolve();
  if(!_xlsxP) _xlsxP=loadLib("https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js")
    .catch(function(e){_xlsxP=null;throw e;});
  return _xlsxP;
}
function ensurePapa(){
  if(typeof Papa!=="undefined") return Promise.resolve();
  if(!_papaP) _papaP=loadLib("https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js")
    .catch(function(e){_papaP=null;throw e;});

}

window.handleFile=async(key,input)=>{
  const a=ctxAccount(); const file=input.files[0]; if(!a||!file) return;
  try{
    const isCsv=/\.csv$/i.test(file.name);
    if(!isCsv){
      try{ await ensureXLSX(); }
      catch(e){
        a.meta[key]={tip:"грешка",poraka:"За читање .xlsx потребна е интернет-врска (библиотеката се презема при прикачување). Поврзете се и обидете се повторно, или користете .csv — тој работи и без интернет."};
        render(); return;
      }
    }else{
      try{ await ensurePapa(); }catch(e){ /* постои вграден резервен читач за .csv */ }
    }
    const buf=await new Promise(function(res,rej){var fr=new FileReader();fr.onload=function(){res(fr.result);};fr.onerror=function(){rej(fr.error);};fr.readAsArrayBuffer(file);});
    let rows;
    if(isCsv){
      const text=new TextDecoder().decode(buf);
      if(typeof Papa!=="undefined") rows=Papa.parse(text,{header:true,skipEmptyLines:true}).data;
      else{
        const lines=text.split(/\r?\n/).filter(l=>l.trim());
        const head=lines[0].split(/[;,]/).map(h=>h.trim());
        rows=lines.slice(1).map(l=>{const c=l.split(/[;,]/);const o={};head.forEach((h,i)=>o[h]=c[i]);return o;});
      }
    }else{
      const wb=XLSX.read(buf);
      rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
    }
    const norm=NORMALIZERS[key](rows);
    if(!norm||!norm.length){
      a.meta[key]={tip:"грешка",poraka:"Колоните не се препознаени. Очекуван формат: "+SOURCES[key].format};
    }else{
      a.data[key]=norm;
      a.meta[key]={tip:"датотека",ime:file.name,zapisi:norm.length};
      if(a.demo){ a.demo=false; toast("Прикачивте свои податоци — демо режимот е исклучен."); }
      selRisk=0; openPred=0;
    }
    save(); recompute();
  }catch(e){
    a.meta[key]={tip:"грешка",poraka:"Датотеката не може да се прочита. Користете .xlsx или .csv."};
  }
  render();
};

/* ---------- SVG графикон ---------- */
function chartSVG(d){
  const kpi=d.kpi; if(!kpi||kpi.length<2) return "";
  const W=720,H=230,padL=44,padR=16,padT=16,padB=30;
  const maxT=Math.max(...kpi.map(k=>k.trosociKvalitet))*1.1||1;
  const bw=(W-padL-padR)/kpi.length;
  let bars="",labels="",grid="";
  for(let g=0;g<=4;g++){
    const y=padT+(H-padT-padB)*g/4;
    grid+=`<line x1="${padL}" y1="${y}" x2="${W-padR}" y2="${y}" stroke="var(--line)" stroke-width="1"/>
      <text x="${padL-6}" y="${y+4}" text-anchor="end" font-size="10" fill="var(--steel)" font-family="IBM Plex Mono,monospace">${Math.round(maxT*(1-g/4)/1000)}к</text>`;
  }
  kpi.forEach((k,i)=>{
    const h=(k.trosociKvalitet/maxT)*(H-padT-padB);
    bars+=`<rect x="${padL+i*bw+bw*0.18}" y="${H-padB-h}" width="${bw*0.64}" height="${h}" rx="3" fill="${i===kpi.length-1?"var(--alarm)":"var(--navy)"}"/>`;
    labels+=`<text x="${padL+i*bw+bw/2}" y="${H-10}" text-anchor="middle" font-size="11" fill="var(--steel)" font-family="IBM Plex Mono,monospace">${esc(k.mesec)}</text>`;
  });
  let line="";
  if(d.complaints&&d.complaints.length){
    const broj=kpi.map((k,i)=>d.complaints.filter(c=>String(c.datum).includes("."+String(i+1).padStart(2,"0"))).length);
    const maxB=Math.max(...broj,1)*1.3;
    const pts=broj.map((b,i)=>`${padL+i*bw+bw/2},${H-padB-(b/maxB)*(H-padT-padB)}`).join(" ");
    line=`<polyline points="${pts}" fill="none" stroke="var(--amber)" stroke-width="2.5"/>`+
      broj.map((b,i)=>`<circle cx="${padL+i*bw+bw/2}" cy="${H-padB-(b/maxB)*(H-padT-padB)}" r="3.5" fill="var(--amber)"/>`).join("");
  }
  return `<div class="card" style="padding:18px 12px 8px;margin-bottom:30px;">
    <div style="font-size:13px;font-weight:600;padding:0 10px 10px;">Трошоци за квалитет (столбови, илј. МКД) и број на рекламации (линија), по месец</div>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;" role="img" aria-label="Графикон">${grid}${bars}${line}${labels}</svg></div>`;
}

      <div class="brand" style="font-size:16px;color:#fff;line-height:1.3;">Intelligent<br><span style="color:#7FB4E8;">Insight</span></div>
      <div class="mono" style="font-size:11px;color:#5C7188;margin-top:8px;">${esc(cur.ime)}</div>
      ${cur.role==="admin"?`<span class="chip" style="background:#24374C;color:#7FB4E8;margin-top:8px;">АДМИН</span>`:""}
    </div>`+
    nav.map(([id,ik,ime])=>`<button type="button" class="nav${view===id?" active":""}" onclick="go('${id}')"><span class="ik">${ik}</span>${ime}</button>`).join("")+
    `<button type="button" class="nav" onclick="logout()"><span class="ik">⏻</span>Одјави се</button>`+
    `<div class="side-foot">${cur.role==="admin"
        ?`Активни сметки: <strong style="color:#93A5B7;">${aktivniKlienti()} / ${MAX_AKTIVNI}</strong>`
        :`Поврзани извори: <strong style="color:#93A5B7;">${brIzvori} / 6</strong>${cur.demo?`<br><span style="color:#E5C06A;">Демо режим вклучен</span>`:""}`}
    </div>`;

  let html="";
  if(cur.role==="admin"){
    if(view==="smetki") html=renderSmetki();
    else if(view==="klienti") html=renderKlienti();
    else html=renderSmetki();
  }else{
    if(view==="tabla") html=renderTabla();
    else if(view==="podatoci") html=renderPodatoci();
    else if(view==="profit") html=!rez?naslov("Модул 01 · Каде губите профит","Истекувања на профит, по извор","")+modeBanner()+emptyState()
      :naslov("Модул 01 · Каде губите профит","Истекувања на профит, по извор",
      "Платформата ги вкрстува КПИ, рекламациите, енергијата, отпадот и CAPA евиденцијата и го искажува секој пропуст во денари — рангирано од најголем кон најмал.")+modeBanner()+renderLeaks();
    else if(view==="rizici") html=!rez?naslov("Модул 02 · Каде се појавуваат ризици","Регистар на ризици","")+modeBanner()+emptyState()
      :naslov("Модул 02 · Каде се појавуваат ризици","Автоматски генериран регистар на ризици",
      "Ризиците не се внесуваат рачно — платформата ги изведува од вашите живи податоци: пробиени CAPA рокови, повторливи рекламации, отворени наоди, енергетски и еколошки трендови.")+modeBanner()+renderRizici();
    else if(view==="predviduvanja") html=!rez?naslov("Модул 03 · Каде ќе се случи следната неусогласеност","Предвидувања","")+modeBanner()+emptyState()
      :naslov("Модул 03 · Каде ќе се случи следната неусогласеност","Предвидување пред наодот, не после",
      "За секоја точка од стандардот каде што се собираат рани сигнали, платформата пресметува веројатност за неусогласеност и предлага превентивна мерка. Допрете на ред за детали.")+modeBanner()+renderPredv();
  }
  document.getElementById("main").innerHTML=html;
}

/* ---------- поврзување на најавата (безбедно, работи на секој уред) ---------- */
document.getElementById("login-btn").addEventListener("click",doLogin);
document.getElementById("user-in").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
document.getElementById("pass-in").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
</script>
</body>
</html>
